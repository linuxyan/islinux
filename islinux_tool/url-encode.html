<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder/Decoder | Tool.isLinux</title>
    <meta name="description" content="Encode and decode URLs online. All processing happens locally in your browser for privacy.">
    <meta name="keywords" content="URL encoder, URL decoder, percent encoding">
    <link rel="canonical" href="https://tool.islinux.com/url-encode.html">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #238636;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-muted: #8b949e;
            --code-bg: #000;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 2.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(35, 134, 54, 0.1) 0%, transparent 100%);
        }

        .logo {
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 0;
        }

        .logo a { color: var(--accent-color); text-decoration: none; }
        .logo a:hover { text-decoration: underline; }

        .tagline { color: var(--text-muted); margin: 1rem 0 0; }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        nav a:hover { border-color: var(--accent-color); color: var(--accent-color); }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }

        .back-link {
            display: inline-block;
            color: var(--text-color);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }

        .back-link:hover { border-color: var(--accent-color); color: var(--accent-color); }

        .tool-header {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .tool-header h1 {
            margin: 0 0 0.5rem;
            color: var(--accent-color);
            font-size: 1.5rem;
        }

        .tool-header p { margin: 0; color: var(--text-muted); }

        .tool-panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .panel-title { margin: 0; color: #fff; font-size: 1.2rem; }
        .panel-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        textarea {
            width: 100%;
            min-height: 200px;
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #7ee787;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            padding: 1rem;
            resize: vertical;
        }

        textarea:focus { outline: none; border-color: var(--accent-color); }

        .output-area {
            background: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
            color: #7ee787;
            max-height: 200px;
            overflow-y: auto;
            display: block;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--accent-color); color: #fff; }
        .btn-primary:hover { background: #2ea043; }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover { border-color: var(--text-color); }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer a { color: var(--text-color); text-decoration: none; margin: 0 0.5rem; }
        footer a:hover { color: var(--accent-color); }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent-color);
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        /* Discover More Section */
        .discover-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .discover-title {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .discover-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .discover-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            display: block;
        }

        .discover-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(35, 134, 54, 0.2);
        }

        .discover-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .discover-title-card {
            margin: 0 0 0.5rem;
            color: var(--accent-color);
            font-size: 1.2rem;
        }

        .discover-description {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; }
            .panel-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo"><a href="index.html">🛠️ Tool.isLinux.com</a></h1>
    <p class="tagline">Developer Client-side Toolkit</p>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="https://islinux.com">Main Site</a>
    </nav>
</header>

<div class="container">
    <a href="index.html" class="back-link">← Back to Tools</a>

    <div class="tool-header">
        <h1>🔗 URL Encoder/Decoder</h1>
        <p>Encode and decode URLs. All processing happens locally in your browser.</p>
    </div>

    <div class="tool-panel">
        <div class="panel-header">
            <h2 class="panel-title">URL Convert</h2>
            <div class="panel-actions">
                <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
                <button class="btn btn-primary" onclick="urlEncode()">Encode</button>
                <button class="btn btn-secondary" onclick="urlDecode()">Decode</button>
                <button class="btn btn-secondary" onclick="copyOutput()">📋 Copy</button>
            </div>
        </div>
        <textarea id="url-input" placeholder="Enter URL to encode or decode..."></textarea>
        <div class="output-area" id="url-output"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Tool.isLinux.com</p>
    <p>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="https://islinux.com/privacy.html">Privacy</a> |
        <a href="https://islinux.com">Main Site</a>
    </p>
</footer>

<!-- Discover More Section -->
<section class="discover-section">
    <h2 class="discover-title">🔍 Discover More</h2>
    <div class="discover-grid" id="discover-grid"></div>
</section>

<div class="toast" id="toast">✅ Copied to clipboard!</div>

<script>
    function clearAll() {
        document.getElementById('url-input').value = '';
        document.getElementById('url-output').innerText = '';
    }

    function urlEncode() {
        const input = document.getElementById('url-input').value;
        const output = document.getElementById('url-output');
        output.innerText = encodeURIComponent(input);
    }

    function urlDecode() {
        const input = document.getElementById('url-input').value;
        const output = document.getElementById('url-output');
        try {
            output.innerText = decodeURIComponent(input);
        } catch (e) {
            output.innerText = '❌ Decode failed: ' + e.message;
        }
    }

    function copyOutput() {
        const output = document.getElementById('url-output');
        if (output && output.innerText) {
            navigator.clipboard.writeText(output.innerText);
            showToast();
        }
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Tool data for discover section
    const tools = [
        { href: 'json-format.html', icon: '📝', title: 'JSON Formatter', description: 'Format, minify, and validate JSON with customizable indentation.' },
        { href: 'json-validate.html', icon: '✅', title: 'JSON Validator', description: 'Check JSON syntax and validate your JSON data.' },
        { href: 'base64.html', icon: '🔐', title: 'Base64 Encoder/Decoder', description: 'Encode text to Base64 or decode Base64 back to text.' },
        { href: 'url-encode.html', icon: '🔗', title: 'URL Encoder/Decoder', description: 'Encode or decode URL-encoded strings.' },
        { href: 'hash.html', icon: '🔑', title: 'Hash Calculator', description: 'Calculate MD5, SHA1, SHA256 hashes for any text.' },
        { href: 'diff.html', icon: '📊', title: 'Text Diff', description: 'Compare two texts and find the differences line by line.' },
        { href: 'favicon-generator.html', icon: '🎨', title: 'Favicon Generator', description: 'Generate favicon.ico and PNG icons from text with customizable styles.' }
    ];

    // Render discover more section with 3 random tools (excluding current page)
    function renderDiscoverMore(currentPage) {
        const otherTools = tools.filter(tool => !currentPage.includes(tool.href));
        const shuffled = otherTools.sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 3);

        const grid = document.getElementById('discover-grid');
        if (grid) {
            grid.innerHTML = selected.map(tool => `
                <a href="${tool.href}" class="discover-card">
                    <div class="discover-icon">${tool.icon}</div>
                    <h3 class="discover-title-card">${tool.title}</h3>
                    <p class="discover-description">${tool.description}</p>
                </a>
            `).join('');
        }
    }

    // Call on page load
    if (typeof window.onload === 'function') {
        const oldOnload = window.onload;
        window.onload = function() {
            oldOnload();
            renderDiscoverMore(window.location.pathname);
        };
    } else {
        window.onload = function() {
            renderDiscoverMore(window.location.pathname);
        };
    }
</script>

</body>
</html>
