<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 | isLinux</title>
    <style>
        :root { --bg-color: #0d1117; --text-color: #c9d1d9; --accent-color: #238636; --border-color: #30363d; --text-muted: #8b949e; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; line-height: 1.8; }
        header { padding: 2rem 1rem; text-align: center; border-bottom: 1px solid var(--border-color); }
        .logo { font-family: 'Courier New', Courier, monospace; font-size: 2rem; font-weight: bold; color: var(--accent-color); margin: 0; }
        .logo span { color: #fff; }
        .container { max-width: 600px; margin: 0 auto; padding: 3rem 1rem; }
        h1 { color: #fff; font-size: 2rem; margin-bottom: 1.5rem; }
        p { margin: 1rem 0; color: var(--text-muted); }
        .contact-info { background: var(--card-bg, #161b22); border: 1px solid var(--border-color); border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0; }
        .contact-item { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
        .contact-icon { font-size: 1.5rem; }
        a { color: var(--accent-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border-color); color: var(--text-muted); }
        footer a { color: var(--text-color); }
    </style>
</head>
<body>
<header>
    <h1 class="logo">is<span>Linux</span>.com</h1>
</header>
<div class="container">
    <h1>联系我们</h1>

    <p>如有任何问题、建议或合作意向，欢迎通过以下方式联系我们：</p>

    <div class="contact-info">
        <div class="contact-item">
            <span class="contact-icon">📧</span>
            <div>
                <strong>一般咨询</strong><br>
                <a href="mailto:contact@islinux.com">contact@islinux.com</a>
            </div>
        </div>
        <div class="contact-item">
            <span class="contact-icon">🔒</span>
            <div>
                <strong>隐私相关</strong><br>
                <a href="mailto:privacy@islinux.com">privacy@islinux.com</a>
            </div>
        </div>
        <div class="contact-item">
            <span class="contact-icon">📢</span>
            <div>
                <strong>广告合作</strong><br>
                <a href="mailto:ads@islinux.com">ads@islinux.com</a>
            </div>
        </div>
    </div>

    <h2>响应时间</h2>
    <p>我们通常会在 1-2 个工作日内回复您的邮件。如遇节假日，响应时间可能会延长。</p>

    <h2>其他联系方式</h2>
    <p>关注我们的社交媒体获取最新动态：</p>
    <ul>
        <li>GitHub: <a href="https://github.com/islinux">@islinux</a></li>
        <li>Twitter: <a href="https://twitter.com/islinux_com">@islinux_com</a></li>
    </ul>
</div>
<footer>
    <p>&copy; 2026 isLinux.com | <a href="index.html">首页</a> | <a href="about.html">关于我们</a> | <a href="privacy.html">隐私政策</a></p>
</footer>
</body>
</html>
