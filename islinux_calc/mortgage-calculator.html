        @media (max-width: 768px) {

<body>

<header>
    <h1 class="logo"><a href="index.html">💰 Calc.isLinux.com</a></h1>
    <p class="tagline">Developer Financial Calculator</p>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="https://islinux.com">Main Site</a>
    </nav>
</header>

<div class="container">
    <a href="index.html" class="back-link">← Back to Tools</a>

    <div class="calc-panel">
        <h2 class="panel-title">🏠 Mortgage Calculator</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Loan Amount</label>
                <input type="number" id="mortgage-amount" placeholder="e.g., 200000" oninput="calcMortgage()">
            </div>
            <div class="form-group">
                <label>Annual Interest Rate (%)</label>
                <input type="number" id="mortgage-rate" placeholder="e.g., 4.2" step="0.01" oninput="calcMortgage()">
            </div>
            <div class="form-group">
                <label>Loan Term (Years)</label>
                <select id="mortgage-years" onchange="calcMortgage()">
                    <option value="10">10 Years</option>
                    <option value="15">15 Years</option>
                    <option value="20" selected>20 Years</option>
                    <option value="25">25 Years</option>
                    <option value="30">30 Years</option>
                </select>
            </div>
            <div class="form-group">
                <label>Payment Type</label>
                <select id="mortgage-type" onchange="calcMortgage()">
                    <option value="equal-payment">Equal Payment (Principal + Interest)</option>
                    <option value="equal-principal">Equal Principal</option>
                </select>
            </div>
        </div>
        <div class="btn-container">
            <button class="btn btn-primary" onclick="calcMortgage()">Calculate</button>
        </div>
        <div class="result-box" id="mortgage-result">
            <div class="result-label">Monthly Payment</div>
            <div class="result-value" id="mortgage-monthly">$0</div>
            <div class="result-details">
                <div class="detail-item">
                    <div class="detail-label">Total Payment</div>
                    <div class="detail-value" id="mortgage-total">$0</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Total Interest</div>
                    <div class="detail-value" id="mortgage-interest">$0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Discover More Section -->
    <section class="discover-section">
        <h2 class="discover-title">🔍 Discover More</h2>
        <div class="discover-grid" id="discover-grid"></div>
    </section>

    <!-- Tool Guide Section -->
    <section class="tool-guide-section">
        <div class="tool-guide-content" id="tool-guide-content"></div>
    </section>

<div class="toast" id="toast">✅ Copied to clipboard!</div>

<script>
    function formatMoney(num) {
        return '$' + num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function calcMortgage() {
        const amount = parseFloat(document.getElementById('mortgage-amount').value) || 0;
        const rate = (parseFloat(document.getElementById('mortgage-rate').value) || 0) / 100;
        const years = parseFloat(document.getElementById('mortgage-years').value) || 20;
        const type = document.getElementById('mortgage-type').value;

        if (amount <= 0 || rate <= 0) {
            document.getElementById('mortgage-result').style.display = 'none';
            return;
        }

        const months = years * 12;
        const monthlyRate = rate / 12;
        const principal = amount;

        let monthlyPayment, totalPayment, totalInterest;

        if (type === 'equal-payment') {
            monthlyPayment = principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
            totalPayment = monthlyPayment * months;
            totalInterest = totalPayment - principal;
        } else {
            const principalMonthly = principal / months;
            const firstPayment = principalMonthly + principal * monthlyRate;
            const lastPayment = principalMonthly + principalMonthly * monthlyRate;
            monthlyPayment = (firstPayment + lastPayment) / 2;
            totalPayment = (principalMonthly + principal * monthlyRate + principalMonthly + principalMonthly * monthlyRate) * months / 2;
            totalInterest = totalPayment - principal;
        }

        document.getElementById('mortgage-result').style.display = 'block';
        document.getElementById('mortgage-monthly').innerText = formatMoney(monthlyPayment);
        document.getElementById('mortgage-total').innerText = formatMoney(totalPayment);
        document.getElementById('mortgage-interest').innerText = formatMoney(totalInterest);
    }
</script>
